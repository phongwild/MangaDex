name: app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ">=3.1.5 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.3
  freezed_annotation: ^2.4.1
  intl: ^0.19.0
  gap: ^3.0.1
  collection: ^1.16.0
  flutter_hooks: ^0.20.3
  flutter_svg: ^2.0.5
  skeletons: ^0.0.3
  get_it: ^7.6.4
  flutter_easyloading: ^3.0.5
  lottie: ^3.3.1
  pin_code_fields: ^8.0.1
  tiengviet: ^1.0.0
  easy_debounce: ^2.0.3
  shared_preferences: ^2.5.2
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  injectable: ^2.3.2
  dartz: ^0.10.1
  socket_io_client: ^2.0.3+1
  uuid: ^4.1.0
  rxdart: ^0.27.7
  connectivity_plus: ^6.1.3
  flutter_localizations:
    sdk: flutter
  change_app_package_name: ^1.4.0
  crystal_navigation_bar: ^1.0.2
  flutter_iconly: ^1.0.2
  curl_logger_dio_interceptor: ^1.0.0
  flutter_floating_bottom_bar: ^1.2.1+1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  country_flags: ^3.2.0
  smooth_page_indicator: ^1.2.0+3
  preload_page_view: ^0.2.0
  overlay_support: ^2.1.0
  flutter_cache_manager: ^3.4.1
  flutter_linkify: ^6.0.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  firebase_core: ^3.12.1
  flutter_secure_storage: ^9.2.4
  flutter_timer_countdown: ^1.0.7
  app_links: ^6.4.0
  google_sign_in: ^6.3.0
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  flutter_lints: ^3.0.1
  injectable_generator: ^2.4.1
  # firebase_app_distribution: ^1.1.1 

flutter_icons:
  android: true
  ios: true
  image_path_android: "assets/app_icon.png"
  image_path_ios: "assets/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21

flutter_intl:
  enabled: true

flutter:
  uses-material-design: true

  assets:
    - assets/

  # Font optimization - only load needed fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700

  # Optimize asset generation
  # This reduces APK size by including only necessary densities
  # Remove this section if you need all densities
  deferred-components:
    - name: imageAssets
      assets:
        - assets/images/
      
  # Optimize for specific screen densities
  # Comment out densities you don't need
  # flutter:
  #   assets:
  #     - assets/images/
  #   asset:
  #     - asset: assets/images/
  #       density: 
  #         - 1.5
  #         - 2.0
  #         - 3.0
  #         - 4.0
